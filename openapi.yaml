openapi: 3.1.0
info:
  title: Kiss Gym API
  description: API for Kiss Gym - Session Tracking and User Management.
  version: v1
paths:
  /:
    get:
      tags:
        - GymApi
      responses:
        '200':
          description: OK
  /api/Info/version:
    get:
      tags:
        - GymApi
      responses:
        '200':
          description: OK
  /api/sessions:
    post:
      tags:
        - Sessions
      summary: 'Create a new training session, optionally inheriting exercises.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    get:
      tags:
        - Sessions
      summary: 'Get sessions with optional filtering, sorting, and pagination.'
      parameters:
        - name: userId
          in: query
          description: Filter by user ID.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by session status (Active or Finished).
          schema:
            $ref: '#/components/schemas/SessionStatus'
        - name: sort
          in: query
          description: "Sort criteria in format 'property[:asc|desc]'. \r\nSupported properties: finishedAt (default), createdAt.\r\nExample: finishedAt:desc"
          schema:
            type: string
        - name: page
          in: query
          description: Page number (default 1).
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: Items per page (default 10).
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponsePagedResponse'
  '/api/sessions/{sessionId}':
    get:
      tags:
        - Sessions
      summary: Get a session by ID.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Sessions
      summary: Rename a session.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameSessionRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/RenameSessionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/RenameSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/sessions/{sessionId}/exercises':
    post:
      tags:
        - Sessions
      summary: "Add a new exercise to the session and start it immediately.\r\nAny currently running exercise is auto-finished."
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddExerciseRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/AddExerciseRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AddExerciseRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/sessions/{sessionId}/exercises/{exerciseId}/start':
    post:
      tags:
        - Sessions
      summary: "Start a pending (inherited) exercise.\r\nAny currently running exercise is auto-finished."
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartExerciseRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/StartExerciseRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/StartExerciseRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/sessions/{sessionId}/exercises/{exerciseId}/finish':
    post:
      tags:
        - Sessions
      summary: Finish a running exercise.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/sessions/{sessionId}/exercises/{exerciseId}':
    delete:
      tags:
        - Sessions
      summary: Remove an exercise from an active session.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/sessions/{sessionId}/finish':
    post:
      tags:
        - Sessions
      summary: Finish the session. Any running exercise is auto-finished first.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/sessions/active:
    get:
      tags:
        - Sessions
      summary: Get active sessions with optional filtering and pagination.
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponsePagedResponse'
  /api/users/register:
    post:
      tags:
        - Users
      summary: Register a new user.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/users/login:
    post:
      tags:
        - Users
      summary: "Login a user (Mocked for development).\r\nSimulates authentication by associating the session with an email.\r\nSets the user context for subsequent requests.\r\nIn production, the client will authenticate directly with Supabase."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/users/me:
    get:
      tags:
        - Users
      summary: Get the current authenticated user profile.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    AddExerciseRequest:
      required:
        - autoLabel
      type: object
      properties:
        autoLabel:
          type: string
        photoUrl:
          type: string
          nullable: true
        properties:
          type: array
          items:
            $ref: '#/components/schemas/ExercisePropertyDto'
          nullable: true
      additionalProperties: false
    CreateSessionRequest:
      required:
        - userId
      type: object
      properties:
        userId:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
        inheritFromSessionId:
          type: string
          format: uuid
          nullable: true
      additionalProperties: false
    ExercisePropertyDto:
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      additionalProperties: false
    ExercisePropertyResponse:
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      additionalProperties: false
    ExerciseResponse:
      required:
        - autoLabel
        - properties
        - status
      type: object
      properties:
        id:
          type: string
          format: uuid
        autoLabel:
          type: string
        photoUrl:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        realEndAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        properties:
          type: array
          items:
            $ref: '#/components/schemas/ExercisePropertyResponse'
      additionalProperties: false
    LoginRequest:
      required:
        - email
      type: object
      properties:
        email:
          type: string
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: { }
    RegisterRequest:
      required:
        - email
        - name
      type: object
      properties:
        email:
          type: string
        name:
          type: string
      additionalProperties: false
    RenameSessionRequest:
      required:
        - label
      type: object
      properties:
        label:
          type: string
      additionalProperties: false
    SessionResponse:
      required:
        - exercises
        - status
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        label:
          type: string
          nullable: true
        inheritedFromSessionId:
          type: string
          format: uuid
          nullable: true
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseResponse'
      additionalProperties: false
    SessionResponsePagedResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
          readOnly: true
      additionalProperties: false
    SessionStatus:
      enum:
        - Active
        - Finished
      type: string
    StartExerciseRequest:
      type: object
      additionalProperties: false
    UserResponse:
      required:
        - email
        - name
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
      additionalProperties: false
tags:
  - name: GymApi
  - name: Sessions
  - name: Users
